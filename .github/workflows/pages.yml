name: Deploy wfweb to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "wfweb/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; não cancela um em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wfweb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wfweb/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          COMMIT_HASH: ${{ github.sha }} # injeta o hash no footer (vite define __COMMIT__)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: wfweb/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
