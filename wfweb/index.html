<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wfweb — CMF watchface editor</title>
  </head>
  <body>
    <header id="topbar">
      <strong class="brand">wfweb</strong>
      <span class="sub">watchface editor · CMF Watch Pro 2</span>
      <span class="spacer"></span>
      <label class="btn file">
        📂 Open .bin<input id="openBin" type="file" accept=".bin" hidden />
      </label>
      <label class="btn file">
        🖼 New photo dial<input id="openPhoto" type="file" accept="image/*" hidden />
      </label>
      <button id="btnExport" class="btn" disabled>💾 Export .bin</button>
      <button id="btnPlay" class="btn" disabled>▶</button>
      <span id="clock" class="clock">10:08:30</span>
      <div class="seg" id="screenSeg" role="tablist" title="Which screen you are editing">
        <button class="seg-btn active" id="segNormal" type="button">🖥 Normal</button>
        <button class="seg-btn" id="segAod" type="button" disabled>🌙 AOD</button>
      </div>
    </header>

    <main id="layout">
      <aside id="left">
        <h2 id="layersTitle">Layers</h2>
        <ul id="layerList" class="layers"></ul>
      </aside>

      <section id="center">
        <div id="stage">
          <canvas id="preview" width="466" height="466"></canvas>
          <div id="hover" class="hover"></div>
        </div>
        <div id="simPanel" class="simpanel">
          <h2>Preview values</h2>
          <div id="simBody"></div>
        </div>
        <div id="assetBar" class="assetbar"></div>
      </section>

      <aside id="right">
        <div id="inspector">
          <h2>Inspector</h2>
          <div id="inspBody" class="insp-empty">Select a layer.</div>
        </div>
        <div id="jsonPane">
          <h2>Notation (JSON)</h2>
          <div id="jsonError" class="json-error" hidden></div>
          <textarea id="jsonText" spellcheck="false" placeholder="Open a .bin to see the notation…"></textarea>
          <button id="btnApplyJson" class="btn wide" disabled>Apply notation</button>
        </div>
      </aside>
    </main>

    <div id="status" class="status">Ready. Open a watchface <code>.bin</code> to start.</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
